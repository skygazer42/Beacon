site_name: Beacon 文档
site_url: https://skygazer42.github.io/Beacon
site_description: Beacon - 基于深度学习的实时视频流智能分析与异常行为检测平台
site_author: Beacon Team
repo_name: skygazer42/Beacon
repo_url: https://github.com/skygazer42/Beacon
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2024-2026 Beacon Team
not_in_nav: |
  CHANGELOG.md
  TAGS.md
  deploy/**
  deployment/build-and-package.md

theme:
  name: material
  language: zh
  custom_dir: docs/overrides
  logo: assets/branding/logo-icon.png
  favicon: assets/branding/logo-icon.png
  icon:
    repo: fontawesome/brands/github
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - announce.dismiss

plugins:
  - search:
      separator: '[\s\u200b\-]'
      lang:
        - zh
        - en
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/skygazer42/Beacon
  generator: false
  version:
    provider: mike

extra_css:
  - assets/css/custom.css

