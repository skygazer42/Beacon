name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  admin:
    name: Admin / Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: Admin
    env:
      BEACON_DISABLE_BACKGROUND: "1"
      BEACON_DJANGO_SECRET_KEY: ci-only-django-secret-key-7YQ4x9M2p8V6k3N5w1R0-not-for-production
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: Admin/requirements-linux.txt
      - name: Install dependencies
        run: python -m pip install -r requirements-linux.txt
      - name: Run Django tests
        run: python manage.py test app.tests -v 1
      - name: Check migration state
        run: python manage.py makemigrations --check --dry-run
      - name: Check production security settings
        env:
          BEACON_DJANGO_DEBUG: "0"
          BEACON_DJANGO_ALLOWED_HOSTS: beacon.example.com
          BEACON_DJANGO_CSRF_TRUSTED_ORIGINS: https://beacon.example.com
          BEACON_DJANGO_SECURE_SSL_REDIRECT: "1"
          BEACON_DJANGO_HSTS_SECONDS: "31536000"
          BEACON_DJANGO_HSTS_INCLUDE_SUBDOMAINS: "1"
          BEACON_DJANGO_HSTS_PRELOAD: "1"
        run: python manage.py check --deploy
      - name: Run launcher tests
        run: python -m unittest test_runtime_paths test_video_analyzer_launcher_paths

  frontend:
    name: Frontend / Node 22
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: Admin/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Admin/frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Verify committed bundle matches source
        run: git diff --exit-code -- ../static/app-shell

  native:
    name: Analyzer and MediaServer
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang cmake libopencv-dev libssl-dev ninja-build pkg-config
      - name: Run Analyzer core tests
        run: bash tools/run_analyzer_unit_tests.sh
      - name: Configure MediaServer
        run: >
          cmake -S MediaServer/source -B "${RUNNER_TEMP}/mediaserver-build"
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DENABLE_TESTS=OFF
          -DENABLE_PLAYER=OFF
          -DENABLE_API=OFF
          -DENABLE_CXX_API=OFF
          -DENABLE_WEBRTC=OFF
          -DENABLE_SRT=OFF
      - name: Build MediaServer
        run: cmake --build "${RUNNER_TEMP}/mediaserver-build" --target MediaServer --parallel 2

  docs-and-sdks:
    name: Docs and SDKs
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            docs/requirements.txt
            sdk/python/pyproject.toml
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/javascript/package-lock.json
      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: "1.20.x"
          cache-dependency-path: sdk/go/go.sum
      - name: Install documentation and SDK build dependencies
        run: python -m pip install -r docs/requirements.txt build==1.5.0 requests==2.34.2
      - name: Build documentation strictly
        run: python tools/docs_strict_check.py
      - name: Test and build Python SDK
        run: |
          python -m unittest discover -s sdk/python/tests -p "test_*.py"
          python -m build sdk/python
      - name: Test and pack JavaScript SDK
        working-directory: sdk/javascript
        run: |
          npm ci
          npm test
          npm pack --dry-run
      - name: Test Go SDK
        working-directory: sdk/go
        run: go test ./...

  deployment:
    name: Compose and Helm
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.0
      - name: Validate Compose
        run: |
          docker compose --env-file deploy/cloud-saas-v1/.env.example -f deploy/cloud-saas-v1/compose.yml config --quiet
          docker compose --env-file deploy/cloud-saas-v1/.env.example -f deploy/cloud-saas-v1/compose.yml -f deploy/cloud-saas-v1/compose.monitoring.yml config --quiet
      - name: Build Cloud image
        run: |
          docker build -f deploy/cloud-saas-v1/Dockerfile -t beacon-cloud-ci:local .
          test "$(docker image inspect beacon-cloud-ci:local --format '{{.Config.User}}')" = "10001:10001"
      - name: Validate Helm chart
        run: python deploy/cloud-saas-v1/tests/test_helm_chart.py

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Reject tracked runtime artifacts
        run: test -z "$(git ls-files -ci --exclude-standard)"
      - name: Scan committed source for secrets
        run: |
          mkdir -p "${RUNNER_TEMP}/beacon-gitleaks-source"
          git archive HEAD | tar -x -C "${RUNNER_TEMP}/beacon-gitleaks-source"
          docker run --rm -v "${RUNNER_TEMP}/beacon-gitleaks-source:/repo:ro" \
            zricethezav/gitleaks:v8.28.0@sha256:cdbb7c955abce02001a9f6c9f602fb195b7fadc1e812065883f695d1eeaba854 \
            detect --source /repo --no-git --config /repo/.gitleaks.toml --redact --no-banner
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Scan source for security patterns
        run: |
          python -m pip install semgrep==1.169.0
          semgrep scan --config p/security-audit --config p/django --timeout 30 --error .
      - name: Audit Python lock inputs
        run: |
          python -m pip install pip-audit==2.10.1
          for requirements in Admin/requirements-cloud.txt Admin/requirements-linux.txt Admin/requirements-windows.txt Admin/requirements-optional.txt Admin/requirements-build.txt docs/requirements.txt; do
            python -m pip_audit -r "$requirements"
          done
      - name: Audit frontend dependencies
        working-directory: Admin/frontend
        run: npm audit --audit-level=high
      - name: Audit JavaScript SDK dependencies
        working-directory: sdk/javascript
        run: npm audit --audit-level=high
