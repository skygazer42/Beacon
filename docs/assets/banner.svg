<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="beaconLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Beacon tower icon -->
  <g transform="translate(100, 30)" filter="url(#glow)">
    <!-- Tower base -->
    <path d="M50 140 L58 70 L82 70 L90 140 Z" fill="url(#textGrad)" opacity="0.9"/>
    <!-- Tower top -->
    <rect x="55" y="50" width="30" height="22" rx="3" fill="url(#textGrad)"/>
    <path d="M55 50 Q70 35 85 50" fill="url(#textGrad)"/>
    <!-- Light -->
    <circle cx="70" cy="60" r="8" fill="url(#beaconLight)" filter="url(#softGlow)"/>
    <circle cx="70" cy="60" r="5" fill="#fff" opacity="0.9"/>
    <!-- Light rays -->
    <g opacity="0.6">
      <line x1="70" y1="52" x2="70" y2="20" stroke="url(#beaconLight)" stroke-width="2" opacity="0.8"/>
      <line x1="62" y1="54" x2="35" y2="25" stroke="url(#beaconLight)" stroke-width="1.5" opacity="0.6"/>
      <line x1="78" y1="54" x2="105" y2="25" stroke="url(#beaconLight)" stroke-width="1.5" opacity="0.6"/>
      <line x1="60" y1="58" x2="25" y2="45" stroke="url(#beaconLight)" stroke-width="1" opacity="0.4"/>
      <line x1="80" y1="58" x2="115" y2="45" stroke="url(#beaconLight)" stroke-width="1" opacity="0.4"/>
    </g>
    <!-- Platform -->
    <rect x="50" y="68" width="40" height="4" rx="2" fill="url(#textGrad)"/>
  </g>

  <!-- Title text -->
  <text x="230" y="85" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="2">Beacon</text>

  <!-- Subtitle -->
  <text x="230" y="120" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#a0aec0" letter-spacing="1">Intelligent Video Behavior Analysis Platform</text>
  <text x="230" y="145" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#718096" letter-spacing="0.5">Real-time AI-powered surveillance • Deep Learning • Edge Computing</text>

  <!-- Version badge -->
  <g transform="translate(230, 158)">
    <rect width="100" height="22" rx="11" fill="url(#textGrad)" opacity="0.3"/>
    <text x="50" y="15" font-family="'Segoe UI', monospace" font-size="10" fill="#a78bfa" text-anchor="middle" font-weight="600">OPEN SOURCE</text>
  </g>

  <!-- Decorative dots on the right -->
  <g opacity="0.15" fill="#667eea">
    <circle cx="650" cy="50" r="3"/>
    <circle cx="670" cy="50" r="3"/>
    <circle cx="690" cy="50" r="3"/>
    <circle cx="710" cy="50" r="3"/>
    <circle cx="650" cy="70" r="3"/>
    <circle cx="670" cy="70" r="3"/>
    <circle cx="690" cy="70" r="3"/>
    <circle cx="710" cy="70" r="3"/>
    <circle cx="650" cy="90" r="3"/>
    <circle cx="670" cy="90" r="3"/>
    <circle cx="690" cy="90" r="3"/>
    <circle cx="710" cy="90" r="3"/>
    <circle cx="650" cy="110" r="3"/>
    <circle cx="670" cy="110" r="3"/>
    <circle cx="690" cy="110" r="3"/>
    <circle cx="710" cy="110" r="3"/>
    <circle cx="650" cy="130" r="3"/>
    <circle cx="670" cy="130" r="3"/>
    <circle cx="690" cy="130" r="3"/>
    <circle cx="710" cy="130" r="3"/>
    <circle cx="650" cy="150" r="3"/>
    <circle cx="670" cy="150" r="3"/>
    <circle cx="690" cy="150" r="3"/>
    <circle cx="710" cy="150" r="3"/>
  </g>

  <!-- Border glow -->
  <rect width="800" height="200" fill="none" stroke="url(#textGrad)" stroke-width="1" rx="12" opacity="0.3"/>
</svg>
