{{- $postgresPassword := required "postgres.auth.password is required" .Values.postgres.auth.password -}}
{{- $minioPassword := required "minio.rootPassword is required" .Values.minio.rootPassword -}}
{{- $openApiToken := required "beaconCloud.secrets.openApiToken is required" .Values.beaconCloud.secrets.openApiToken -}}
{{- $djangoSecretKey := required "beaconCloud.secrets.djangoSecretKey is required" .Values.beaconCloud.secrets.djangoSecretKey -}}
{{- $edgeTokenPepper := required "beaconCloud.secrets.edgeTokenPepper is required" .Values.beaconCloud.secrets.edgeTokenPepper -}}
{{- $bootstrapPassword := required "beaconCloud.secrets.bootstrapAdminPassword is required" .Values.beaconCloud.secrets.bootstrapAdminPassword -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "beacon-cloud-saas-v1.fullname" . }}-secret
  labels:
    {{- include "beacon-cloud-saas-v1.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ $postgresPassword | quote }}
  beacon-cloud-db-url: {{ printf "postgresql://%s:%s@%s:%v/%s" (.Values.postgres.auth.username | urlquery) ($postgresPassword | urlquery) (include "beacon-cloud-saas-v1.postgresName" .) .Values.postgres.service.port (.Values.postgres.auth.database | urlquery) | quote }}
  minio-root-user: {{ .Values.minio.rootUser | quote }}
  minio-root-password: {{ $minioPassword | quote }}
  beacon-open-api-token: {{ $openApiToken | quote }}
  beacon-django-secret-key: {{ $djangoSecretKey | quote }}
  beacon-edge-token-pepper: {{ $edgeTokenPepper | quote }}
  beacon-bootstrap-admin-username: {{ .Values.beaconCloud.secrets.bootstrapAdminUsername | quote }}
  beacon-bootstrap-admin-password: {{ $bootstrapPassword | quote }}
