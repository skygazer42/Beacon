# Beacon Cloud SaaS v1 - Monitoring add-on (Prometheus + Grafana)
#
# 用法（在 cloud-saas-v1 POC 基础上叠加监控）：
#   cd deploy/cloud-saas-v1
#   docker compose -f compose.yml -f compose.monitoring.yml up -d
#
# 访问：
# - Prometheus: http://localhost:9090
# - Grafana:    http://localhost:3000   (password comes from .env)

services:
  prometheus:
    image: prom/prometheus:v3.13.1
    environment:
      BEACON_OPEN_API_TOKEN: "${BEACON_OPEN_API_TOKEN:?}"
    entrypoint: ["/bin/sh", "-ec"]
    command:
    - |
      umask 077
      printf '%s' "$$BEACON_OPEN_API_TOKEN" > /tmp/beacon-metrics-token
      exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml
    volumes:
    - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
    - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
    - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    - grafana_data:/var/lib/grafana
    ports:
    - "3000:3000"
    restart: unless-stopped

volumes:
  grafana_data:
