# Beacon Observability (Tracing) - Local/Dev Stack
#
# Starts:
# - OpenTelemetry Collector (receivers: OTLP gRPC+HTTP, Zipkin)
# - Jaeger (UI + OTLP ingestion)
# - Grafana Tempo (OTLP ingestion)
# - Grafana (Tempo datasource pre-provisioned)
#
# Usage:
#   cd deploy/observability/tracing
#   export GF_SECURITY_ADMIN_PASSWORD='replace-with-a-strong-password'
#   docker compose -f compose.yml up -d

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      # OTLP receivers (Beacon Admin/Analyzer exporters will hit these).
      - "4317:4317" # OTLP/gRPC
      - "4318:4318" # OTLP/HTTP
      # Zipkin receiver (Beacon MediaServer exports Zipkin v2 JSON).
      - "9411:9411" # Zipkin
      # Health check (optional).
      - "13133:13133" # / (plain)
    depends_on:
      - jaeger
      - tempo
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.53
    environment:
      # Enable OTLP ingestion (collector listens on 4317/4318 inside the container network).
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200" # Tempo HTTP API (Grafana datasource / query)
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD:?set GF_SECURITY_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000" # Grafana UI
    depends_on:
      - tempo
    restart: unless-stopped

volumes:
  tempo_data:
  grafana_data:
