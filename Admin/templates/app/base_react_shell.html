<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="shortcut icon" href="/static/images/favicon.ico">
    <link rel="icon" type="image/png" href="/static/images/logo.png">
    <link rel="apple-touch-icon" href="/static/images/logo.png">
    <title>{{ site_title|default:"Beacon 新一代 AI 视频分析系统" }} | {% block title %}{% endblock %}</title>
    <link href="/static/app-shell/beacon-shell.css?v={{ project_version|urlencode }}" rel="stylesheet">
  </head>
  <body class="beacon-shell-body">
    <script>
      // Anti-flash: apply theme before any paint
      (function(){var t;try{t=localStorage.getItem('beacon-theme')}catch(e){}
      if(t==='system'){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}
      else if(t!=='light'){t='dark'}
      document.documentElement.setAttribute('data-theme',t)})();
    </script>
    <div id="beacon-app-root">
      <div class="beacon-shell-loading" aria-live="polite">Beacon 新一代 AI 视频分析系统</div>
    </div>
    <script id="beacon-bootstrap" type="application/json">
      {
        "path": "{{ request.path|escapejs }}",
        "queryString": "{{ request.META.QUERY_STRING|default:''|escapejs }}",
        "siteName": "{{ site_name|default:'Beacon'|escapejs }}",
        "siteTitle": "{{ site_title|default:'Beacon 新一代 AI 视频分析系统'|escapejs }}",
        "siteLogo": "{{ site_logo|default:'/static/images/logo.png'|escapejs }}",
        "themeColor": "{{ theme_color|default:''|escapejs }}",
        "docsUrl": "{{ docs_url|default:''|escapejs }}",
        "downloadUrl": "{{ download_url|default:''|escapejs }}",
        "deploymentMode": "{{ deployment_mode|default:'edge'|escapejs }}",
        "debugEnabled": {% if debug_enabled %}true{% else %}false{% endif %},
        "user": {
          "id": "{{ request.session.user.id|default:''|escapejs }}",
          "username": "{{ request.session.user.username|default:''|escapejs }}",
          "isStaff": {% if bootstrap_is_staff %}true{% else %}false{% endif %},
          "isSuperuser": {% if bootstrap_is_superuser %}true{% else %}false{% endif %}
        }
      }
    </script>

    <template id="beacon-legacy-content">
      {% block content %}{% endblock content %}
    </template>

    <script type="module" src="/static/app-shell/beacon-shell.js?v={{ project_version|urlencode }}"></script>
  </body>
</html>
